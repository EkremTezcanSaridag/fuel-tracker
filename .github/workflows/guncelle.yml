name: Günlük Fiyat Güncelleme

on:
  schedule:
    - cron: '0 * * * *'  # Her saat basi (UTC, GitHub Actions scheduler)
  workflow_dispatch:       # Elle de çalıştırılabilir

    inputs:
      test_notification:
        description: Hedef cihaza test bildirimi gonder
        required: false
        default: false
        type: boolean
      test_installation_id:
        description: Test bildiriminin hedef installation_id degeri
        required: false
        default: ''
        type: string

jobs:
  guncelle:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri kur
        run: pip install -r backend/requirements.txt

      - name: Fiyatları güncelle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SEND_TEST_NOTIFICATION: ${{ inputs.test_notification }}
          TEST_NOTIFICATION_INSTALLATION_ID: ${{ inputs.test_installation_id }}
        run: python backend/fiyat_servisi.py
